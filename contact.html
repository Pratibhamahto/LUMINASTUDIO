  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MFGK42KV"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
  <nav>
    <a href="index.html" class="brand">Lumina</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>
  <main>
    <div class="contact-layout">
      <div class="contact-sidebar">
        <h2>Let's build something <em>great.</em></h2>
        <div class="detail-item">
          <div class="dl">Email</div>
          <div class="dv">hello@luminastudio.co</div>
        </div>
        <div class="detail-item">
          <div class="dl">Phone</div>
          <div class="dv">+91 99999 00000</div>
        </div>
        <div class="detail-item">
          <div class="dl">Location</div>
          <div class="dv">Mumbai, India</div>
        </div>
        <div class="detail-item">
          <div class="dl">Office Hours</div>
          <div class="dv">Mon – Fri, 10am – 7pm IST</div>
        </div>
      </div>

      <div class="contact-form-area">
        <h2 class="form-heading">Send us a message</h2>

        <div class="form-row">
          <div class="field">
            <label for="fname">First Name</label>
            <input type="text" id="fname" placeholder="Arjun"/>
          </div>
          <div class="field">
            <label for="lname">Last Name</label>
            <input type="text" id="lname" placeholder="Mehta"/>
          </div>
        </div>

        <div class="field">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com"/>
        </div>

        <div class="field">
          <label for="service">Service Interested In</label>
          <select id="service">
            <option value="">Select a service…</option>
            <option>Brand Identity</option>
            <option>Web Design</option>
            <option>Strategy</option>
            <option>Other</option>
          </select>
        </div>

        <div class="field">
          <label for="msg">Your Message</label>
          <textarea id="msg" placeholder="Tell us about your project…"></textarea>
        </div>

        <!-- No JS: anchor link acts as submit, goes to thankyou page -->
        <a href="thankyou.html" class="submit-link">Send Message →</a>
      </div>
    </div>
  </main>
  <footer>© 2026 Lumina Studio — Crafted with <span>♥</span></footer>
</body>
</html>
